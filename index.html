<body class="bg-slate-50">
  <div id="root"></div>

  <!-- KODE REACT APP -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- CONFIGURATION ---
    const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz-Um422Lqpxfi1OzEz6v9ahpu_T12lfT5jKqG6miqJ3FFAqfpOwUzfrTFaVYAPypvi/exec";

    const formatRp = (number) => {
      return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);
    };
    // Fungsi agar angka ada titiknya saat diketik (1000 -> 1.000)
    const formatThousand = (val) => {
        if (!val) return "";
        const num = val.toString().replace(/[^0-9]/g, "");
        return num ? parseInt(num).toLocaleString("id-ID") : "";
    };
    // --- KOMPONEN IKON ---
    const Icon = ({ name, className = "" }) => <span className={`material-symbols-outlined ${className}`}>{name}</span>;
    
    const showAlert = (options) => {
      if (window.Swal) {
        window.Swal.fire({ fontFamily: 'sans-serif', ...options });
      } else {
        alert(options.title + (options.text ? `\n${options.text}` : ''));
      }
    };

    // FUNGSI CARI ADMIN FEE (Taruh di atas function App)
    const findAdminFee = (nominal, layanan, fees) => {
      if (!fees || fees.length === 0) return 0;
      
      const match = fees.find(f => {
        const categoryInSheet = f.category.toLowerCase();
        const serviceInApp = layanan.toLowerCase();
        
        return serviceInApp.includes(categoryInSheet) && 
               nominal >= f.min && 
               nominal <= f.max;
      });
      
      return match ? match.fee : 0;
    };

    function App() {
      const [userRole, setUserRole] = useState(null);
      const [cashierId, setCashierId] = useState('');
      const [loading, setLoading] = useState(true);
      const [products, setProducts] = useState([]);
      const [categories, setCategories] = useState([]);
      const [transactions, setTransactions] = useState([]);
      const [balances, setBalances] = useState({ kembalian: 0, pulsa: 0, bank: 0 });
      const [storeConfig, setStoreConfig] = useState({ name: 'Toko Mas Heru', address: '', phone: '', footer: ''});
      const [adminFees, setAdminFees] = useState([]);

      const handleLoginSuccess = (role, code) => {
        setUserRole(role);
        setCashierId(code);
        
        // SIMPAN KE MEMORI BROWSER
        localStorage.setItem('tokoHeru_role', role);
        localStorage.setItem('tokoHeru_cashier', code);
      };

      const syncToGoogleSheets = async (action, data) => {
        try {
          await fetch(APP_SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action, data, timestamp: new Date().toISOString() })
          });
        } catch (error) { console.error("Sync Error:", error); }
      };
      
      useEffect(() => {
        const savedRole = localStorage.getItem('tokoHeru_role');
        const savedCashier = localStorage.getItem('tokoHeru_cashier');
        if (savedRole && savedCashier) {
          setUserRole(savedRole);
          setCashierId(savedCashier);
        }
        const loadData = async () => {
          try {
            const res = await fetch(APP_SCRIPT_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify({ action: 'GET_INITIAL_DATA' })
            });
            const result = await res.json();
            if (result.status === 'success') {
              setProducts(result.data.products || []);
              setCategories(result.data.categories || []);
              setTransactions(result.data.transactions || []);
              if (result.data.balances) setBalances(result.data.balances);
              if (result.data.storeConfig) setStoreConfig(result.data.storeConfig);
            }
            if (result.data.adminFees) {
              setAdminFees(result.data.adminFees);
            }
          } catch (e) { console.error("Load Error", e); }
          finally { setLoading(false); }
        };
        loadData();
      }, []);
      
      const handleLogout = () => {
        setUserRole(null);
        setCashierId('');
        
        // HAPUS DARI MEMORI BROWSER
        localStorage.removeItem('tokoHeru_role');
        localStorage.removeItem('tokoHeru_cashier');
      };

      if (loading) return (
        <div className="full-immersive text-white text-2xl font-bold italic">
          "Bismillah.."
        </div>
      );
      
      if (!userRole) {
        return <LoginScreen onLogin={handleLoginSuccess} />;
      }
      return (
        <div className="min-h-screen bg-slate-50">
          {userRole === 'kasir' ? (
            <KasirDashboard 
              products={products} 
              categories={categories} 
              storeConfig={storeConfig}
              cashierId={cashierId} 
              transactions={transactions}
              adminFees={adminFees}
              onLogout={handleLogout}
              onTransactionSuccess={(trx) => {
                setTransactions(prev => [trx, ...prev]);
                syncToGoogleSheets('ADD_TRANSACTION', trx);
                setBalances(prev => {
                  const nb = { ...prev };
                  if (trx.method === 'Cash') nb.kembalian += trx.total;
                  else if (trx.method === 'MESIN EDC') nb.bank += trx.total;
                  trx.items.forEach(i => {
                    const sub = i.price * i.qty;
                    if (i.category === 'Tarik Tunai') nb.kembalian -= sub;
                    else if (['Pulsa', 'Paket Data'].includes(i.category)) nb.pulsa -= sub;
                    else if (i.category === 'Transfer') nb.bank -= sub;
                  });
                  
                  syncToGoogleSheets('UPDATE_BALANCES', nb);
                  return nb;
                });
              }}
            />
          ) : (
            <AdminDashboard 
              products={products} setProducts={setProducts} categories={categories} setCategories={setCategories}
              transactions={transactions} balances={balances} setBalances={setBalances}
              storeConfig={storeConfig} setStoreConfig={setStoreConfig}
              onLogout={handleLogout}
              syncToSheets={syncToGoogleSheets}
            />
          )}
        </div>
      );
    }
    // ==========================================
    // 1. LOGIN SCREEN
    // ==========================================
    function LoginScreen({ onLogin }) {
      const [role, setRole] = useState('kasir');
      const [pin, setPin] = useState('');
      const [cashierCode, setCashierCode] = useState('');

      const handleLogin = async (e) => {
        e.preventDefault();
        
        // Validasi input kosong
        if (!pin.trim() || (role === 'kasir' && !cashierCode.trim())) {
          showAlert({ icon: 'warning', title: 'Perhatian', text: 'Isi data dengan lengkap!' });
          return;
        }

        try {
          showAlert({ 
            title: 'Memverifikasi...', 
            allowOutsideClick: false, 
            didOpen: () => { window.Swal.showLoading(); } 
          });

          // Kita kirim "ADMIN" sebagai cashierCode kalau role-nya admin
          const loginData = {
            cashierCode: role === 'admin' ? 'ADMIN' : cashierCode.trim().toUpperCase(),
            pin: pin.trim()
          };

          const response = await fetch(APP_SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ 
              action: 'CHECK_LOGIN', 
              data: loginData 
            })
          });
          
          const result = await response.json();

          if (result && result.valid) {
            window.Swal.close();
            // Login sukses!
            if (role === 'admin') {
              onLogin('admin', 'ADMIN');
            } else {
              onLogin('kasir', loginData.cashierCode);
            }
          } else {
            showAlert({ 
              icon: 'error', 
              title: 'Login Gagal', 
              text: result.message || 'PIN atau Kode Salah!' 
            });
          }
        } catch (err) {
          console.error("Login Error:", err);
          showAlert({ icon: 'error', title: 'Error', text: 'Koneksi database bermasalah.' });
        }
      };

      return (
        <div className="full-immersive p-4">
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
            <div className="text-center mb-8">
              <div className="bg-indigo-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                <Icon name="storefront" className="text-indigo-600 text-3xl" />
              </div>
              <h1 className="text-2xl font-bold text-gray-800">Toko Mas Heru</h1>
              <p className="text-gray-500 text-sm mt-1">Silakan masuk untuk melanjutkan</p>
            </div>

            <form onSubmit={handleLogin} className="space-y-6">
              <div className="flex gap-4">
                <button type="button" onClick={() => setRole('kasir')} className={`flex-1 py-3 rounded-xl font-medium transition-all ${role === 'kasir' ? 'bg-indigo-600 text-white shadow-md' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>Mode Kasir</button>
                <button type="button" onClick={() => setRole('admin')} className={`flex-1 py-3 rounded-xl font-medium transition-all ${role === 'admin' ? 'bg-red-500 text-white shadow-md' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>Mode Admin</button>
              </div>

              {role === 'kasir' && (
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-2">Kode Kasir: <span className="text-xs text-gray-400 font-normal">(sesuai cabang)</span></label>
                  <input type="text" value={cashierCode} onChange={(e) => setCashierCode(e.target.value)} placeholder="••••" className="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all text-center text-xl uppercase tracking-wider" required />
                </div>
              )}

              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">Kode PIN <span className="text-xs text-gray-400 font-normal">:</span></label>
                <input type="password" value={pin} onChange={(e) => setPin(e.target.value)} placeholder="••••" className="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all text-center text-2xl tracking-[0.5em]" required />
              </div>
              <button type="submit" className="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-xl font-bold shadow-lg shadow-green-200 transition-all active:scale-95">MASUK</button>
            </form>
          </div>
        </div>
      );
    }

    // ==========================================
    // 2. KASIR DASHBOARD (POS)
    // ==========================================
    function KasirDashboard({ products, categories, storeConfig, cashierId, transactions, adminFees, onLogout, onTransactionSuccess }) {
      const [refNumber, setRefNumber] = useState('');
      const [cart, setCart] = useState([]);
      const [showPayment, setShowPayment] = useState(false);
      const [paymentMethod, setPaymentMethod] = useState('Cash');
      const [searchQuery, setSearchQuery] = useState('');
      const [paymentAmount, setPaymentAmount] = useState('');
      const [activeCategory, setActiveCategory] = useState('Semua');
      const [lastInvoice, setLastInvoice] = useState(null);
      const [showHistory, setShowHistory] = useState(false);
      const [isMobileCartOpen, setIsMobileCartOpen] = useState(false);
      // const [adminFees, setAdminFees] = useState([]);
      const [walletName, setWalletName] = useState('');
      const quickActions = [
        { id: 'qa1', name: 'Transfer Bank', icon: 'account_balance', color: 'bg-blue-500', options: ['BNI', 'BRI', 'ANTAR BANK', 'KARTU ATM'] },
        { id: 'QA2', name: 'Tarik Tunai', icon: 'payments', color: 'bg-emerald-500'},
        { id: 'qa2', name: 'Top Up E-Wallet', icon: 'account_balance_wallet', color: 'bg-purple-500', options: ['GOPAY', 'DANA', 'OVO', 'SHOPEEPAY', 'LINKAJA'] },
        { id: 'qa3', name: 'Bayar Tagihan', icon: 'receipt_long', color: 'bg-orange-500', options: ['ADIRA', 'BPJS', 'ACC FINANCE', 'PNM', 'BFI', 'HOME CREDIT', 'LAINNYA'] }
      ];

      const handleQuickAction = (action) => {
        let options = {};
        if (action.name === 'Transfer Bank') {
          options = { 'BNI': 'BNI', 'BRI': 'BRI', 'ANTAR BANK': 'ANTAR BANK', 'KARTU ATM': 'KARTU ATM' };
        } else if (action.name === 'Top Up E-Wallet') {
          options = { 'GOPAY': 'GOPAY', 'DANA': 'DANA', 'OVO': 'OVO', 'SHOPEEPAY': 'SHOPEEPAY', 'LINKAJA': 'LINKAJA' };
        } else if (action.name === 'Bayar Tagihan') {
          options = { 'ADIRA': 'ADIRA', 'BPJS': 'BPJS', 'PNM': 'PNM', 'HOME CREDIT': 'HOME CREDIT', 'BFI': 'BFI', 'ACC FINANCE': 'ACC FINANCE', 'LAINNYA': 'LAINNYA' };
        } else if (action.name === 'Tarik Tunai') {
          options = { 'BNI': 'BNI', 'BRI': 'BRI', 'KARTU ATM': 'KARTU ATM' };
        }

        window.Swal.fire({
          title: `Layanan ${action.name}`,
          html: `
            <div class="text-left space-y-4">
              ${Object.keys(options).length > 0 ? `
                <div>
                  <label class="block text-[8px] font-bold text-slate-400 mb-1 uppercase tracking-widest">Pilih Sumber:</label>
                  <select id="swal-vendor" class="w-full p-3 bg-slate-50 border-2 border-slate-100 rounded-xl outline-none focus:border-indigo-500 font-bold">
                    ${Object.entries(options).map(([val, label]) => `<option value="${val}">${label}</option>`).join('')}
                  </select>
                </div>
              ` : ''}
              <div>
                <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-widest">Nominal ${action.name}:</label>
                <div class="relative">
                  <span class="absolute left-4 top-1/2 -translate-y-1/2 font-black text-slate-300 text-xl">Rp</span>
                  <input id="swal-nominal" class="w-full p-5 text-3xl font-black border-2 border-slate-100 rounded-3xl text-right focus:border-indigo-500 outline-none" placeholder="0">
                </div>
              </div>
            </div>
          `,
          showCancelButton: true,
          confirmButtonText: 'Tambah',
          didOpen: () => {
            const nom = document.getElementById('swal-nominal');
            nom.focus();
            nom.oninput = (e) => {
              let val = e.target.value.replace(/\D/g, '');
              e.target.value = val ? parseInt(val).toLocaleString('id-ID') : '';
            };
          },
          preConfirm: () => {
            const nominal = parseInt(document.getElementById('swal-nominal').value.replace(/\D/g, ''));
            const vendor = document.getElementById('swal-vendor').value;
            
            if (!nominal) return window.Swal.showValidationMessage('Isi nominal!');

            let keyword = "";
            if (action.name === 'Transfer Bank') keyword = `TRF ${vendor}`;
            else if (action.name === 'Tarik Tunai') keyword = `TARIK ${vendor}`;
            else keyword = vendor;

            const fee = findAdminFee(nominal, keyword, adminFees);
            return { nominal, vendor, fee, keyword };
          }
        }).then(res => {
          if (res.isConfirmed) {
            const { nominal, vendor, fee } = res.value;
            const newItem = {
              id: `QA-${Date.now()}`,
              name: vendor ? `${action.name} (${vendor})` : action.name,
              price: nominal + fee, 
              modal: nominal,
              category: action.name,
              qty: 1,
              note: `Nominal: ${nominal}, Admin: ${fee}`
            };
            setCart(prev => [...prev, newItem]);
          }
        });
      };

      const formatRp = (number) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);

      const filteredProducts = products.filter(p => {
        const matchCat = activeCategory === 'Semua' || p.category === activeCategory;
        const matchSearch = p.name.toLowerCase().includes(searchQuery.toLowerCase());
        return matchCat && matchSearch;
      });

      const updateQty = (id, delta) => {
        setCart(prevCart => {
          return prevCart.map(item => {
            if (item.id === id) {
              if (item.id.includes('-')) {
                if (delta > 0) {
                  showAlert({ icon: 'info', title: 'Info', text: 'Untuk nominal custom, silakan tambah item baru dari menu.' });
                  return item;
                }
              }
              
              const newQty = Math.max(1, item.qty + delta);
              return { ...item, qty: newQty };
            }
          return item;
          });
        });
      };

      // --- FUNGSI KERANJANG BARU (POP-UP MUNCUL UNTUK SEMUA BARANG) ---
      const addToCart = (p) => {
          // 1. Cek stok paling awal
          if (p.stock !== undefined && p.stock <= 0) {
              showAlert({ icon: 'error', title: 'Stok Habis', text: 'Barang tidak mencukupi!' });
              return;
          }

          // 2. Munculkan form Keterangan di semua kategori
          const showKeterangan = true;
          
          let extraHtml = '';
          if (showKeterangan) {
              extraHtml = `
                  <div class="mb-3">
                      <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-widest">Keterangan Produk Yang Dibeli:</label>
                      <input id="swal-keterangan" type="text" class="w-full p-3 bg-slate-50 border-2 border-slate-100 rounded-xl outline-none focus:border-indigo-500 font-bold text-slate-700" placeholder="Contoh: IM3 10Gb / 50.000 / Tipe / Varian Warna...">
                  </div>
              `;
          }

          // Siapkan pre-fill angka dari database
          const defaultModal = p.modal ? formatThousand(p.modal) : '0';
          const defaultJual = p.price ? formatThousand(p.price) : '0';

          window.Swal.fire({
              title: `Detail ${p.name}`,
              html: `
                  <div class="mt-4 text-left text-sm">
                      ${extraHtml}
                      
                      <!-- Input Modal & Harga Jual -->
                      <div class="grid grid-cols-2 gap-3 mt-2">
                          <div>
                              <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-widest">Harga Modal:</label>
                              <div class="relative flex items-center">

                                  <button type="button" id="btn-modal-000" class="absolute right-2 bg-slate-200 text-slate-600 text-[10px] font-black px-2 py-1.5 rounded hover:bg-slate-300 active:scale-95 transition-transform" title="Tambah 3 Nol">000</button>
                              </div>
                          </div>

                              <label class="block text-[10px] font-bold text-indigo-400 mb-1 uppercase tracking-widest">Harga Jual:</label>

                                  <span class="absolute left-3 font-bold text-indigo-300">Rp</span>

                                  <button type="button" id="btn-jual-000" class="absolute right-2 bg-indigo-200 text-indigo-700 text-[10px] font-black px-2 py-1.5 rounded hover:bg-indigo-300 active:scale-95 transition-transform" title="Tambah 3 Nol">000</button>

                      <p class="text-[9px] text-slate-400 mt-2 text-center">*Tips: Tekan tombol <b>Spasi</b> atau <b>Titik (.)</b> saat ngetik untuk tambah "000" otomatis</p>
                  </div>
              `,
              showCancelButton: true,
              confirmButtonText: 'Tambahkan',
              confirmButtonColor: '#4f46e5',
              didOpen: () => {
                  // Format Rupiah Otomatis saat ngetik & Jalan Pintas "000"
                  const formatRupiahInput = (el) => {
                      // 1. Tangkap ketikan Spasi atau Titik
                      el.addEventListener('keydown', (e) => {
                          if (e.key === ' ' || e.key === '.' || e.key.toLowerCase() === 'k') {
                              e.preventDefault(); // Cegah spasi masuk ke input
                              let raw = el.value.replace(/[^0-9]/g, '');
                              if (raw) {
                                  raw = raw + "000";
                                  el.value = parseInt(raw).toLocaleString('id-ID');
                              }
                          }
                      });

                      // 2. Format Rupiah Normal
                      el.addEventListener('input', (e) => {
                          let raw = e.target.value.replace(/[^0-9]/g, '');
                          e.target.value = raw ? parseInt(raw).toLocaleString('id-ID') : '';
                      });
                  };
                  
                  const jualInput = document.getElementById('swal-jual-input');
                  const modalInput = document.getElementById('swal-modal-input');
                  const ketInput = document.getElementById('swal-keterangan');
                  
                  const btnModal000 = document.getElementById('btn-modal-000');
                  const btnJual000 = document.getElementById('btn-jual-000');

                  if (jualInput) formatRupiahInput(jualInput);
                  if (modalInput) formatRupiahInput(modalInput);

                  // Fungsi buat Tombol "000" di layar
                  const append000 = (inputEl) => {
                      let raw = inputEl.value.replace(/[^0-9]/g, '');
                      if (raw) {
                          raw = raw + "000";
                          inputEl.value = parseInt(raw).toLocaleString('id-ID');
                          inputEl.focus(); // Balikin fokus ke input
                      }
                  };

                  if (btnModal000 && modalInput) btnModal000.addEventListener('click', () => append000(modalInput));
                  if (btnJual000 && jualInput) btnJual000.addEventListener('click', () => append000(jualInput));

                  // Arahkan kursor cerdas
                  if (showKeterangan && ketInput) {
                      ketInput.focus();
                  } else if (jualInput && defaultJual === '0') {
                      jualInput.focus();
                  }
              },
              preConfirm: () => {
                  const jualRaw = document.getElementById('swal-jual-input').value.replace(/[^0-9]/g, '');
                  const modalRaw = document.getElementById('swal-modal-input').value.replace(/[^0-9]/g, '');
                  const jual = parseInt(jualRaw) || 0;
                  const modal = parseInt(modalRaw) || 0;

                  if (jual <= 0) return window.Swal.showValidationMessage('Harga jual tidak boleh kosong!');

                  let finalName = p.name;
                  let finalNote = `Modal: ${modal}`;

                  if (showKeterangan) {
                      const ket = document.getElementById('swal-keterangan').value.trim();
                      if (ket !== '') {
                          finalName = `${p.name} - ${ket}`; 
                      }
                  }

                  return { finalName, jual, modal, finalNote };
              }
          }).then(res => {
              if (res.isConfirmed) {
                  const { finalName, jual, modal, finalNote } = res.value;
                  
                  setCart(prevCart => {
                      const existingItem = prevCart.find(item => item.name === finalName && item.price === jual);
                      
                      if (existingItem) {
                          if (p.stock !== undefined && existingItem.qty >= p.stock) {
                              showAlert({ icon: 'error', title: 'Stok Habis', text: 'Barang tidak mencukupi!' });
                              return prevCart;
                          }
                          return prevCart.map(item =>
                              item.id === existingItem.id ? { ...item, qty: item.qty + 1 } : item
                          );
                      }
                      
                      const newItem = {
                          id: `PROD-${Date.now()}`,
                          name: finalName,
                          price: jual,
                          modal: modal,
                          category: p.category,
                          qty: 1,
                          note: finalNote
                      };
                      return [...prevCart, newItem];
                  });
              }
          });
      };
          
          // ==========================================
          // LOGIKA UNTUK PRODUK BIASA (DENGAN CEK STOK)
          // ==========================================
          // setCart(prevCart => {
            // const existingItem = prevCart.find(item => item.id === p.id);
            // if (existingItem) {
              // if (p.stock !== undefined && existingItem.qty >= p.stock) {

                // return prevCart;

              // return prevCart.map(item =>
                // item.id === p.id ? { ...item, qty: item.qty + 1 } : item
              // );
            // }
            // return [...prevCart, { ...p, qty: 1 }];
          // });

      const totalBelanja = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);

        if (cart.length === 0) return;

        setPaymentAmount('');

      const shareToWhatsApp = () => {
        if (!lastInvoice) return;

        const text = `*${storeConfig.name}*%0A` +
                     `ID: ${lastInvoice.id}%0A` +
                     `Tanggal: ${new Date(lastInvoice.date).toLocaleString('id-ID')}%0A` +
                     `--------------------------%0A` +
                     
                     `${itemDetail}%0A` +

                     `*TOTAL: ${formatRp(lastInvoice.total)}*%0A` +

        document.body.appendChild(clone);

          setTimeout(() => {
            const el = document.getElementById('print-clone');
            if (el) el.remove();
          }, 2000);

          cashierId: cashierId,

        showAlert({

          title: 'Transaksi Berhasil!',
          text: 'Struk digital telah siap.',
          timer: 1500,
          showConfirmButton: false

      function AdminDashboard({ products, setProducts, categories, setCategories, transactions, balances, setBalances, storeConfig, setStoreConfig, onLogout, syncToSheets }) {
      const [activeTab, setActiveTab] = useState('dashboard');

      // --- LOGIKA PERHITUNGAN BARU ---
      const isToday = (dateString) => {
        const today = new Date();
        const d = new Date(dateString);
        return d.getDate() === today.getDate() &&
               d.getMonth() === today.getMonth() &&
               d.getFullYear() === today.getFullYear();
      };

      const transactionsToday = transactions.filter(trx => isToday(trx.date));

      // 1. Penghasilan Kotor (Hari Ini) = Total transaksi hari ini
      const kotorHariIni = transactionsToday.reduce((sum, trx) => sum + trx.total, 0);

      // 2. Penghasilan Bersih (Hari Ini) = Keuntungan (Harga Jual - Harga Modal)
      const bersihHariIni = transactionsToday.reduce((sum, trx) => {
        let profitTrx = 0;
        trx.items.forEach(item => {
          const modal = item.modal || 0; // Ambil modal yang disimpan saat checkout
          // Fallback buat riwayat transaksi lama yang belum punya record modal
          if (!item.modal && item.note && item.note.includes('Admin: ')) {
               const fee = parseInt(item.note.split('Admin: ')[1].replace(/\D/g, '')) || 0;
               profitTrx += (fee * item.qty);
          } else {
               profitTrx += ((item.price - modal) * item.qty);
          }
        });
        return sum + profitTrx;
      }, 0);

      // 3. Total Aset = Keseluruhan transaksi sepanjang masa
      const totalAset = transactions.reduce((sum, trx) => sum + trx.total, 0);

      const navItems = [
        { id: 'dashboard', label: 'Dashboard', icon: 'dashboard' },
        { id: 'products', label: 'Kelola Barang', icon: 'inventory_2' },
        { id: 'categories', label: 'Kategori', icon: 'sell' },
        { id: 'balances', label: 'Informasi Saldo', icon: 'account_balance_wallet' },
        { id: 'history', label: 'Riwayat Transaksi', icon: 'history' },
        { id: 'settings', label: 'Pengaturan', icon: 'settings' },
      ];

      return (
        <div className="flex flex-col md:flex-row h-screen bg-slate-50">
          <div className="w-full md:w-64 bg-slate-900 text-white flex flex-row md:flex-col overflow-x-auto md:overflow-x-visible">
            <div className="p-4 md:p-6 border-r md:border-r-0 md:border-b border-slate-800 flex items-center md:items-start shrink-0">

            </div>
            <nav className="flex-1 flex flex-row md:flex-col p-2 md:p-4 md:space-y-2 gap-2 md:gap-0 shrink-0">
              {navItems.map(item => (
                <button key={item.id} onClick={() => setActiveTab(item.id)} className={`flex items-center gap-3 px-4 py-3 rounded-xl transition-all whitespace-nowrap ${activeTab === item.id ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>
                  <Icon name={item.icon} /> <span className="font-medium hidden md:inline">{item.label}</span>
                </button>
              ))}
            </nav>
            <div className="p-2 md:p-4 border-l md:border-l-0 md:border-t border-slate-800 shrink-0 flex items-center">
              <button onClick={onLogout} className="w-full flex items-center justify-center md:justify-start gap-3 px-4 py-3 text-red-400 hover:bg-red-500/10 rounded-xl transition-all">
                <Icon name="logout" /> <span className="font-medium hidden md:inline">Keluar</span>
              </button>
            </div>
          </div>

          <div className="flex-1 flex flex-col overflow-hidden">
            <div className="bg-white border-b border-gray-200 px-4 md:px-8 py-5 flex items-center justify-between">
              <h1 className="text-xl md:text-2xl font-bold text-gray-800">{navItems.find(i => i.id === activeTab)?.label}</h1>
              <div className="flex items-center gap-3">
                <span className="bg-lime-100 text-lime-700 px-3 py-1 rounded-full text-xs md:text-sm font-semibold flex items-center gap-2">
                  <span className="w-2 h-2 rounded-full bg-orange-500 animate-pulse"></span> <span className="hidden md:inline">Online</span>
                </span>
              </div>
            </div>

            <div className="flex-1 overflow-y-auto p-4 md:p-8">
              {activeTab === 'dashboard' && (
                <div className="space-y-6">

                  <div className="w-full h-32 md:h-40 bg-indigo-100 rounded-2xl overflow-hidden relative shadow-sm">
                     <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&w=1200&q=80" alt="Admin Banner" className="w-full h-full object-cover opacity-80" />

                       <div className="text-white">
                         <h2 className="text-2xl font-bold mb-1">Ringkasan Performa Toko</h2>

                       </div>

                  {/* KARTU PENGHASILAN SESUAI GAMBAR */}
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    {/* Card Kotor */}
                    <div className="bg-gradient-to-br from-blue-500 to-blue-700 p-6 rounded-3xl shadow-lg shadow-blue-200 text-white flex flex-col justify-between relative overflow-hidden">
                      <Icon name="payments" className="absolute -right-4 -bottom-4 text-8xl text-white/20" />

                        <p className="text-blue-100 text-sm font-bold mb-1 uppercase tracking-wider">Penghasilan Kotor</p>
                        <p className="text-xs text-blue-200 mb-4 bg-white/20 inline-block px-2 py-1 rounded-md">Hari Ini</p>

                        <p className="text-xs text-blue-100 opacity-80">Omzet + Modal hari ini</p>
                      </div>
                    </div>

                    {/* Card Bersih */}
                    <div className="bg-gradient-to-br from-emerald-500 to-emerald-700 p-6 rounded-3xl shadow-lg shadow-emerald-200 text-white flex flex-col justify-between relative overflow-hidden">
                      <Icon name="account_balance_wallet" className="absolute -right-4 -bottom-4 text-8xl text-white/20" />

                        <p className="text-xs text-emerald-100 opacity-80">Total keuntungan bersih (margin)</p>
                      </div>
                    </div>

                    {/* Card Aset */}
                    <div className="bg-gradient-to-br from-purple-500 to-purple-700 p-6 rounded-3xl shadow-lg shadow-purple-200 text-white flex flex-col justify-between relative overflow-hidden">
                      <Icon name="savings" className="absolute -right-4 -bottom-4 text-8xl text-white/20" />
                      <div className="relative z-10">
                        <p className="text-purple-100 text-sm font-bold mb-1 uppercase tracking-wider">Total Aset</p>
                        <p className="text-xs text-purple-200 mb-4 bg-white/20 inline-block px-2 py-1 rounded-md">Sepanjang Masa</p>
                        <h3 className="text-3xl font-black mb-1">{formatRp(totalAset)}</h3>
                        <p className="text-xs text-purple-100 opacity-80">Akumulasi seluruh transaksi</p>
                      </div>
                    </div>
                  </div>

                  {/* Info Tambahan */}
                  <div className="grid grid-cols-2 gap-4">
                    <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">
                      <div className="w-12 h-12 bg-orange-100 text-orange-600 rounded-xl flex items-center justify-center"><Icon name="shopping_cart" /></div>
                      <div><p className="text-gray-500 text-xs font-medium">Transaksi Hari Ini</p><h3 className="text-lg font-bold text-gray-800">{transactionsToday.length} Nota</h3></div>
                    </div>
                    <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">
                      <div className="w-12 h-12 bg-indigo-100 text-indigo-600 rounded-xl flex items-center justify-center"><Icon name="inventory_2" /></div>
                      <div><p className="text-gray-500 text-xs font-medium">Total Produk Aktif</p><h3 className="text-lg font-bold text-gray-800">{products.length} Item</h3></div>
                    </div>
                  </div>

                  {/* Transaksi Terbaru */}
                  <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                    <div className="p-6 border-b border-gray-100 flex justify-between items-center">
                      <h3 className="font-bold text-lg text-gray-800">Transaksi Terbaru</h3>
                      <button onClick={() => setActiveTab('history')} className="text-indigo-600 text-sm font-medium hover:underline flex items-center">Lihat Semua <Icon name="chevron_right" /></button>
                    </div>
                    <div className="overflow-x-auto">
                      <table className="w-full text-left border-collapse min-w-[500px]">
                        <thead>
                          <tr className="bg-gray-50 text-gray-500 text-sm border-b border-gray-100">
                            <th className="p-4 font-medium">ID Transaksi</th><th className="p-4 font-medium">Waktu</th><th className="p-4 font-medium">Item</th><th className="p-4 font-medium">Total Belanja</th>
                          </tr>
                        </thead>
                        <tbody>
                          {transactions.slice(0, 5).map((trx) => (
                            <tr key={trx.id} className="border-b border-gray-50 hover:bg-gray-50 transition-colors">
                              <td className="p-4 font-medium text-gray-800">{trx.id}</td><td className="p-4 text-gray-500">{new Date(trx.date).toLocaleString('id-ID')}</td>

      const openEdit = (key, value) => {
        setEditKey(key);
        setEditValue(value ? value.toString() : '0'); 
      };

      const saveEdit = (e) => {
        e.preventDefault();
        const val = parseInt(editValue.replace(/\D/g, '')) || 0;
        const newBalances = { ...balances, [editKey]: val };
        setBalances(newBalances);
        syncToSheets('UPDATE_BALANCES', newBalances);
        setEditKey(null);
        showAlert({ icon: 'success', title: 'Tersimpan', text: 'Saldo berhasil diperbarui.' });
      };

        const num = val.replace(/\D/g, '');

      };

        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">

            <p className="text-sm text-gray-500 mt-1">Kelola modal laci fisik, saldo otomatis pulsa, dan saldo bank.</p>

            <div className="bg-blue-50 border border-blue-100 p-5 rounded-2xl">
              <div className="flex items-center gap-3 mb-2">
                <div className="bg-blue-100 p-2 rounded-lg text-blue-600"><Icon name="payments" /></div>
                <h4 className="font-bold text-gray-700">Saldo Kembalian / Laci</h4>
              </div>
              <p className="text-sm text-gray-500 mb-4 h-12">Modal awal dan uang di laci fisik (bertambah sesuai total checkout).</p>
              <div className="text-2xl font-bold text-blue-700 mb-4">{formatRp(balances.kembalian)}</div>
              <button onClick={() => openEdit('kembalian', balances.kembalian)} className="w-full bg-white text-blue-600 border border-blue-200 py-2 rounded-lg font-medium hover:bg-blue-100 transition">Set Saldo Kembalian</button>
            </div>

            <div className="bg-green-50 border border-green-100 p-5 rounded-2xl">
              <div className="flex items-center gap-3 mb-2">
                <div className="bg-green-100 p-2 rounded-lg text-green-600"><Icon name="sim_card" /></div>

    // ==========================================
    // MENU RIWAYAT TRANSAKSI (DENGAN MODAL, UNTUNG & REKAP PDF)
    // ==========================================
    function AdminHistory({ transactions, storeConfig }) {

      // Fungsi pembantu hitung UNTUNG per transaksi
      const calculateTrxProfit = (items) => {
        return items.reduce((sum, item) => {
          const modal = item.modal || 0;
          // Fallback manual buat data lama kalau ada
          if (!item.modal && item.note && item.note.includes('Admin: ')) {
             const fee = parseInt(item.note.split('Admin: ')[1].replace(/\D/g, '')) || 0;
             return sum + (fee * item.qty);
          }
          return sum + ((item.price - modal) * item.qty);
        }, 0);
      };

      // Fungsi pembantu hitung MODAL per transaksi
      const calculateTrxModal = (items) => {
        return items.reduce((sum, item) => {
          const modal = item.modal || 0;
          // Fallback manual buat data lama kalau ada
          if (!item.modal && item.note && item.note.includes('Nominal: ')) {
             const nom = parseInt(item.note.split('Nominal: ')[1].split(',')[0].replace(/\D/g, '')) || 0;
             return sum + (nom * item.qty);
          }
          return sum + (modal * item.qty);
        }, 0);
      };

      const handleDownloadPDF = () => {
        try {
          const { jsPDF } = window.jspdf;
          const doc = new jsPDF('l', 'mm', 'a4'); 

          doc.setTextColor(0, 0, 0);
          doc.setFontSize(16);
          doc.text(`LAPORAN REKAP TRANSAKSI - ${storeConfig.name}`, 14, 15);
          
          doc.setFontSize(10);
          doc.text(`Periode Laporan: ${new Date().toLocaleDateString('id-ID')}`, 14, 22);
          doc.text(`Dicetak pada: ${new Date().toLocaleString('id-ID')}`, 14, 27);

          doc.setLineWidth(0.5);
          doc.line(14, 30, 280, 30);

          // TAMBAH KOLOM MODAL DI PDF
          const tableColumn = ["ID", "Kasir", "Waktu", "Metode", "Rincian Item", "Harga Modal", "Keuntungan", "Harga Jual"];
          const tableRows = transactions.map(trx => {
            const untung = calculateTrxProfit(trx.items);
            const modal = calculateTrxModal(trx.items);
            return [
              trx.id,
              trx.cashierId || '-',
              new Date(trx.date).toLocaleString('id-ID'),
              trx.refNumber ? `${trx.method}\n(Ref: ${trx.refNumber})` : (trx.method || 'Cash'),
              trx.items.map(i => `${i.qty}x ${i.name}`).join(', '),
              formatRp(modal),
              formatRp(untung),
              formatRp(trx.total)
            ];
          });

          doc.autoTable({
            head: [tableColumn],
            body: tableRows,
            startY: 35,
            theme: 'grid',
            headStyles: { fillColor: [79, 70, 229], textColor: [255, 255, 255], halign: 'center' },
            columnStyles: {
              5: { halign: 'right' }, // Kolom Harga Modal
              6: { halign: 'right', fontStyle: 'bold' }, // Kolom Keuntungan
              7: { halign: 'right', fontStyle: 'bold' }  // Kolom Total/Harga Jual
            },
            styles: { textColor: [0, 0, 0], fontSize: 9 },
          });

          const finalY = doc.lastAutoTable ? doc.lastAutoTable.finalY : 40;
          const grandTotalTransaksi = transactions.reduce((sum, t) => sum + t.total, 0);
          const grandTotalUntung = transactions.reduce((sum, t) => sum + calculateTrxProfit(t.items), 0);
          const grandTotalModal = transactions.reduce((sum, t) => sum + calculateTrxModal(t.items), 0);
          
          // --- BAGIAN RESUME/RINGKASAN DI BAWAH ---
          doc.setFontSize(11);
          doc.setFont(undefined, 'bold');
          
          // Garis penutup rekap
          doc.line(180, finalY + 5, 280, finalY + 5);
          
          // TOTAL MODAL (Warna Abu-abu Gelap)
          doc.setTextColor(71, 85, 105); 
          doc.text(`TOTAL HARGA MODAL :`, 180, finalY + 12);
          doc.text(`${formatRp(grandTotalModal)}`, 280, finalY + 12, { align: 'right' });
          
          // TOTAL KOTOR (Warna Hitam)
          doc.setTextColor(0, 0, 0); 
          doc.text(`TOTAL PENGHASILAN KOTOR :`, 180, finalY + 19);
          doc.text(`${formatRp(grandTotalTransaksi)}`, 280, finalY + 19, { align: 'right' });
          
          // TOTAL BERSIH (Warna Hijau)
          doc.setTextColor(22, 163, 74); 
          doc.text(`TOTAL KEUNTUNGAN BERSIH :`, 180, finalY + 26);
          doc.text(`${formatRp(grandTotalUntung)}`, 280, finalY + 26, { align: 'right' });

          doc.save(`Laporan_Rekap_${storeConfig.name}_${Date.now()}.pdf`);
        } catch (error) {
          console.error("Gagal cetak PDF:", error);
          showAlert({ icon: 'error', title: 'Error', text: 'Gagal membuat PDF.' });
        }
      };
      
      return (
        <div className="bg-white rounded-2xl shadow-sm border border-gray-100">
          <div className="p-6 border-b border-gray-100 flex flex-col md:flex-row md:justify-between md:items-center gap-4">
            <h3 className="font-bold text-lg text-gray-800 flex items-center gap-2">
              <Icon name="history" className="text-indigo-600"/> Riwayat Transaksi & Laba
            </h3>
            <button onClick={handleDownloadPDF} className="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg flex items-center justify-center gap-2 font-medium transition-colors shadow-sm">
              <Icon name="picture_as_pdf" /> Download PDF Rekap
            </button>
          </div>

          <div className="overflow-x-auto">
            <table className="w-full text-left border-collapse min-w-[950px]">
              <thead>
                <tr className="bg-gray-50 text-gray-500 text-sm border-b border-gray-100">
                  <th className="p-4 font-medium">ID</th>
                  <th className="p-4 font-medium">Kasir</th>
                  <th className="p-4 font-medium">Waktu</th>
                  <th className="p-4 font-medium">Metode</th>
                  <th className="p-4 font-medium">Rincian Item</th>
                  <th className="p-4 font-medium text-right bg-orange-50 text-orange-700">Harga Modal</th>
                  <th className="p-4 font-medium text-right bg-emerald-50 text-emerald-700">Keuntungan</th>
                  <th className="p-4 font-medium text-right">Harga Jual</th>
                </tr>
              </thead>
              <tbody>
                {transactions.map((trx) => {
                  const untungTrx = calculateTrxProfit(trx.items);
                  const modalTrx = calculateTrxModal(trx.items);
                  return (
                    <tr key={trx.id} className="border-b border-gray-50 hover:bg-gray-50">
                      <td className="p-4 font-bold text-gray-700">{trx.id}</td>
                      <td className="p-4 font-medium text-indigo-600">{trx.cashierId || '-'}</td>
                      <td className="p-4 text-gray-600 text-xs">{new Date(trx.date).toLocaleString('id-ID')}</td>
                      <td className="p-4 text-xs font-bold uppercase">{trx.method || 'Cash'}</td>
                      <td className="p-4">
                        <div className="flex flex-wrap gap-1">
                          {trx.items.map((item, i) => (
                            <span key={i} className="text-[10px] text-gray-500 bg-gray-100 px-2 py-0.5 rounded">
                              {item.qty}x {item.name}
                            </span>
                          ))}
                        </div>
                      </td>
                      {/* KOLOM HARGA MODAL */}
                      <td className="p-4 font-medium text-orange-600 text-right bg-orange-50/30">
                        {formatRp(modalTrx)}
                      </td>
                      {/* KOLOM KEUNTUNGAN */}
                      <td className="p-4 font-bold text-emerald-600 text-right bg-emerald-50/30">
                        {formatRp(untungTrx)}
                      </td>
                      {/* KOLOM TOTAL KOTOR / HARGA JUAL */}
                      <td className="p-4 font-bold text-gray-800 text-right">{formatRp(trx.total)}</td>
                    </tr>
                  );
                })}
                {transactions.length === 0 && <tr><td colSpan="8" className="p-12 text-center text-gray-400">Belum ada riwayat transaksi.</td></tr>}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

          <form onSubmit={handleSubmit} className="p-6 space-y-5">
            <div><label className="block text-sm font-medium text-gray-700 mb-1">Nama Toko / Bisnis</label><input required type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" /></div>
            <div><label className="block text-sm font-medium text-gray-700 mb-1">Alamat Lengkap</label><textarea required rows="3" value={formData.address} onChange={e => setFormData({...formData, address: e.target.value})} className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" /></div>
            <div><label className="block text-sm font-medium text-gray-700 mb-1">Nomor Telepon</label><input required type="text" value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" /></div>
            <div><label className="block text-sm font-medium text-gray-700 mb-1">Pesan Penutup di Struk (Footer)</label><input required type="text" value={formData.footer} onChange={e => setFormData({...formData, footer: e.target.value})} className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" /></div>
            <div className="pt-4 border-t border-gray-100">
              <button type="submit" className="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 shadow-lg shadow-indigo-200 transition-all">Simpan Konfigurasi</button>
            </div>
          </form>
        </div>
      );
    }

    // Render App ke DOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
